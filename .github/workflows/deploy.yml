name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Deploy to server
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_PASS: ${{ secrets.SERVER_PASS }}
        SERVER_PATH: ${{ secrets.SERVER_PATH }}
      run: |
        sshpass -p "$SERVER_PASS" ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "sudo rm -rf ${SERVER_PATH}/*"
        sshpass -p "$SERVER_PASS" scp -o StrictHostKeyChecking=no -r ./dist/* ${SERVER_USER}@${SERVER_HOST}:/tmp/dist/
        sshpass -p "$SERVER_PASS" ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} "sudo cp -r /tmp/dist/* ${SERVER_PATH}/ && sudo chown -R www-data:www-data ${SERVER_PATH}/ && sudo rm -rf /tmp/dist/*"
