name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Verify dist exists
        run: |
          ls -la dist
          test -f dist/index.html

      - name: Archive dist
        run: |
          tar -czf dist.tar.gz dist
          ls -lh dist.tar.gz

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            REMOTE_DIR="/tmp/boomeroff-${{ github.run_id }}"
            echo "=== Diagnostics ==="
            whoami
            pwd
            echo "HOME=$HOME"
            df -h | head -5
            echo "=== Sudo check ==="
            if sudo -n true 2>/dev/null; then
              echo "sudo: OK (NOPASSWD)"
            else
              echo "sudo: NOT available without password"
            fi
            echo "=== Prepare staging dir ==="
            mkdir -p "$REMOTE_DIR"
            rm -rf "$REMOTE_DIR"/*
            test -w "$REMOTE_DIR" && echo "staging dir writable: OK"

      - name: Upload archive via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          source: "dist.tar.gz"
          target: "/tmp/boomeroff-${{ github.run_id }}/"

      - name: Publish to web root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            REMOTE_DIR="/tmp/boomeroff-${{ github.run_id }}"
            echo "=== Uploaded files ==="
            ls -la "$REMOTE_DIR"
            test -f "$REMOTE_DIR/dist.tar.gz" || { echo "ERROR: dist.tar.gz missing in upload"; exit 1; }

            echo "=== Extract archive ==="
            tar -xzf "$REMOTE_DIR/dist.tar.gz" -C "$REMOTE_DIR"
            test -f "$REMOTE_DIR/dist/index.html" || { echo "ERROR: index.html missing after extract"; exit 1; }
            ls -la "$REMOTE_DIR/dist" | head -20

            echo "=== Publishing to /var/www/boomeroff ==="
            if sudo -n true 2>/dev/null; then
              sudo mkdir -p /var/www/boomeroff
              sudo rm -rf /var/www/boomeroff/*
              sudo cp -a "$REMOTE_DIR/dist/." /var/www/boomeroff/
              sudo chown -R www-data:www-data /var/www/boomeroff/ || true
              sudo rm -rf "$REMOTE_DIR"
              echo "Publish: DONE"
            else
              echo "ERROR: sudo not available without password."
              echo "Fix: allow the deploy user to publish without interactive sudo, or make /var/www/boomeroff writable by the deploy user."
              exit 1
            fi
