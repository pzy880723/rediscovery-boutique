name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci || npm install

    - name: Build project
      run: npm run build

    - name: Verify dist exists
      run: |
        ls -la dist
        test -f dist/index.html

    - name: Prepare remote directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASS }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          echo "=== Diagnostics ==="
          whoami
          pwd
          echo "HOME=$HOME"
          df -h | head -5
          echo "=== Sudo check ==="
          if sudo -n true 2>/dev/null; then
            echo "sudo: OK (NOPASSWD)"
          else
            echo "sudo: NOT available without password"
          fi
          echo "=== Prepare staging dir ==="
          mkdir -p "$HOME/deploy/boomeroff"
          rm -rf "$HOME/deploy/boomeroff"/*
          test -w "$HOME/deploy/boomeroff" && echo "staging dir writable: OK"

    - name: Upload dist via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASS }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "dist/*"
        target: "deploy/boomeroff"
        strip_components: 1

    - name: Publish to web root
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASS }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          set -e
          echo "=== Uploaded files ==="
          ls -la "$HOME/deploy/boomeroff" | head -20
          test -f "$HOME/deploy/boomeroff/index.html" || { echo "ERROR: index.html missing in upload"; exit 1; }
          echo "=== Publishing to /var/www/boomeroff ==="
          if sudo -n true 2>/dev/null; then
            sudo mkdir -p /var/www/boomeroff
            sudo rm -rf /var/www/boomeroff/*
            sudo cp -a "$HOME/deploy/boomeroff/." /var/www/boomeroff/
            sudo chown -R www-data:www-data /var/www/boomeroff/ || true
            echo "Publish: DONE"
          else
            echo "ERROR: sudo not available without password."
            echo "Fix: run 'sudo visudo' on the server and add:"
            echo "  ${USER} ALL=(ALL) NOPASSWD: /bin/mkdir, /bin/rm, /bin/cp, /bin/chown, /usr/bin/chown"
            exit 1
          fi
